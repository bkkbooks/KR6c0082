body:
  text: 序夫自羲皇畫卦倉頡造書天地始開文字自文字開而後有三教是三教文字之祖出於一原尚已逮其後三教分而遂各為一教之文字要其立言之旨總以盡性致命為歸用開人心明覺闡大道宗源以垂訓天下初無異同降而異端紛起附會之徒各分門戶互相犄角彼此詆非是使三教文字本以正天下天下反因之以擾此不特如來皺眉孔老亦為蹙額獨自性命之説不能相岐故三教書典往往文字相異立説自同此如來金剛一經直通於孔孟高於老聃蓋以是經之義大要以覺性為旨一切求通覺性之論似淺而深似虗而實其説原於天命合於性善而明於道德五十言故能使上知下愚無不開悟發蒙明心見性此經之所以為諸經祖也但其間六塵四相福德布施之説始終問答不出於是總見覺性因由不從後起而借以啓人之迷引人入道若其功之至要則不外降伏一言其反於自然尤著力無所住而生其心一語故説是經者不可以虗無寂滅之論誣我如來正旨也辛丑二月望後道人適訪道匡廬子真行者亦復來遊江右遇我於竹林精舍相與言世外事了無剩義而子真力欲於塵寰中作度人想道人因與偕至尉山尉山子真舊遊地也其地山環水瀠實可棲隱道人喜而留之中有二三弟子頗好精進子真向與二三子有宿緣遂以金剛一經欲我解釋道人始難之既而見其有誠可終始竟事者因請於如來得慈悲旨開壇設講凡四十日告成諸弟子復請道人為之序道人因念此經解者什伯大半多屬宗門語録釋氏公案不得如來説經之要故特以經中字義就字參義總以歸於正覺不使見者聞者稍存疑闕雖於釋氏之論微有不同然開如來之真面目以發如來之真妙諦則不出乎如是知如是見如是信解而已要之釋教真空原於實理未有其理不實而泛泛言空者夫如來之言真空無相原以覺性本無虗靈無相可著而後之解者舍其正旨掇其粗迹一切經中六塵四相福德布施敷衍成篇便同癡人説夢何益於覺性所以道人之解獨重三藐三菩提一語也蓋是語實一經之綱領而合三教之源流得其旨趣則諸經之説與三教之道一以貫通初未嘗有疑玄難信者為後世藉口但凡人耳提口授尚多所疑況憑一乩之言何以為據惟是不作誕語不設浮辭止有盡性致命之理曉暢明白庶乎不罪於如來而亦可使從事孔老者皆以道人為非欺世之言耳後有作者能以道人之意刊而布之此解亦可當寰中一鑑也時辛丑四月望前五日雲峰道人乩書敘夫人之與仙相隔於形而相合以神其所得合者非偶然也必合之也有因故能相聚而成功焉我嘗論仙蹤於世若即若離譬如風之有聲觸物成響不可執聲以為風又不可謂聲之非風也然以為無形而有聲者事近於誕則凡乩書之言皆涉於虗渺而難稽故周穆漢武並好神仙之術乃始而信既而疑終而盡返平生之所為則神仙之不足據見於經傳者亦大明矣我敢自托於神仙憑一乩以惑天下乎然我則有説焉夫憑一乩而言不可知之言述無可考之事者幻也若天壤間有書典而神仙能讀之書典中有奧義而神仙能釋之幻乎非幻乎此我不敢自居於神仙而好為不可稽之言也獨以如來金剛一經參演成帙者不但為諸弟子言直以剖天下後世之疑而共證此解蓋是解也我得之於雲峰大師而雲峰大師又得之於天竺國土親受如來之教始得傳於乩書我何嘗有參解之功哉但不得不竊附於參解之末者良以參解之法有三難耳一難在於解直而未得深也二難在於言簡而未得詳也三難在於蠲棄一切宗門語録釋氏公案而未得動時俗之耳目也試以經中摘要言之即如祇園恆河須彌等名舊本俱有圖樣確指里數而今皆刪矣如阿修羅歌利王轉輪王俱有名號出處今亦盡刪矣如三菩提則從舊解正覺三昧直以昧字對覺字矣四果菩薩舊解須陀洹等皆屬名號今即作入流一往來解矣涅槃作彼岸解佛土作艮土解皆異於別解矣先世及過去未來現在向作夙世今生解今已顯然照字義解矣種種名色可傳而不可考者無不刪煩就約或經文只一言而參解必晰或經文有纍言而大略點過此皆説是經之摘要處也所以雲峰大師獨於世所未盡解者明白通曉言之則我之得參此經其中不過什之二三然我又有説焉此經之得釋幸遇大師於匡廬亦幸遇諸弟子於新邑乃得共襄厥功夫雲峰大師之來原以諸弟子之堅誠所致但我於諸弟子言之皆産於雲間客於江右向與我世有夙緣得復合遇斯土遂發是願迎大師至新邑開壇設講閲四十日告成其始則辛丑二月十九日其終則四月初九日也夫以四十日之中大師之與諸弟子仙凡雖隔而神氣自通所以不覺其成之速而我與諸弟子皆獲證如來之妙旨得附大師之後以傳其名諸弟子亦不無有補焉嗟乎天人非遙仙凡豈迥能以覺性自存便可作合於今日則今日之得書是經於乩以布刊於世者不為非無因矣諸弟子惟相勗而奉持解説之不使天下後世以神仙為誕妄亦庶幾共見如來真面目也時辛丑孟夏四月既望谷口子真乩書於尉山故里
