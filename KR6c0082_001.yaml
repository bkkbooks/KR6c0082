body:
  text: 姚秦三藏法師鳩摩羅什譯雲峰大師乩釋谷口子真乩訂法會因由分第一如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐子真説金剛一經是如來説真空無相之旨首言如是終説如如不動前後相應雲峰説如則是不如則不是如如則并無所是不可竟作開講語如是則我得而聞之不如是則雖有説法不可得為我聞矣一時佛在者見佛之在此一時欲聞法而不見佛在則此心未堅今佛已在而我所聞不已確乎此二句是記者欲以所聞所見證如來現身説法意子真説舍衛國在西域天竺之東時佛偶到其國而非常住祇樹祇陀太子所種因以為名是文家寫景意給孤獨園者乃昔迦尼給散孤獨之處時佛在其園中與比丘衆同居比丘弟子之稱比丘言大者以其通達道理猶高座弟子也時有千二百五十人同住於此雲峰説此一段言佛在此地而從之者衆見其信而從之也與之俱則必與之聞矣三句是説佛之能化諸弟子處子真説爾時世尊非佛之外另有世尊以聖人之稱謂佛以人之尊佛而謂世尊總一佛也著衣著褊袒衣有云柔和之衣持鉢是持優龍鉢有云天王所獻之鉢入此舍衛國城中而乞食者未説法前先以乞食而動諸衆之見聞也次第乞已便是無住相圖畫不必論其多寡有無乞過則已並不留一毫未已之想還至還到給孤獨園中也於無住相中而仍有一住處故曰本也飯食訖而收衣鉢便完一段乞食供案洗足已不過清淨意雲峯説飯食訖三句可作一串説子真説敷座者獨設高座於千二百五十人之上時已坐而世尊將欲説法也雲峯説乞食而已完洗足而已過俱是佛之得心處故敷座而絶無倚著人常靜坐一刻萬緣皆起非是不足便求有餘則躍然而起世尊於此已忘卻乞食事是無我相張本矣善現起請分第二時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞子真説長老即千二百五十人中之有德行者須菩提有三名一曰空生一曰善現一曰須菩提此其得證果之號也在大衆中即從座起者時世尊先已敷座而大衆亦已皆坐獨須菩提從坐間而起立其時所衣則偏袒而挂之右肩是西域衣製皆如此不是須菩提獨穿此衣也右膝著地則今之跪禮也言右不言左者是文字中減省法言合掌恭敬而白佛言只是敬求世尊説法意希有二字是須菩提稱讚説言之世尊是當世希有者而獨尊於世也雲峰説如來即是佛即是世尊如來二字有二義以其靜而言之則若止水以其感而言之則如流泉當其止時萬感不動當其流時百念不滯故曰如來也如來二字尚有奧義舊説寂然不動感而遂通此但言如來之字義耳夫來者必有所自而來惟適如其來者其來也不藉乎法相法相者來以後之事未來之前無有法相只有一如蓋如者覺性之源也故當其源之未發則如含於性當其既發則如覺於心此如字之不可以虗解也如來者如則可來則不如者不得來矣如來則未及如者亦不能即來矣合而言之何在非如則何在非適如其所如以來乎此又進於寂然不動二句之解前言近於喻今仍以本文字義釋之總以如字合到覺性説則無不如矣子真説善護念諸菩薩諸菩薩即千二百五十人菩薩是通稱善護者言如來能以善念保護諸菩薩念者即如來之念善付囑者即足上句意如來能保護眷念諸菩薩則必能以此法付委而囑托之矣此段是須菩提冀望如來説法話頭子真説世尊二字是須菩提呼佛名而求説法也凡後世尊二字俱是須菩提尊稱如來者男子女人在千二百五十人之外言有善念之男子女人同集於此而發阿耨多羅三藐三菩提心也雲峰説發者猶生發之法阿字是語助辭耨多羅三字譯作無上二字講三藐二字譯作正等二字講三菩提譯作正覺二字講蓋人有此心而溺於情欲則不能發生譬如萌芽方茁而為物所掩則欲茁而不得茁矣故下一發字發者順其所生也何謂無上無有一物更可以加其上也正等者言此無上之心自如來及諸菩薩以迄衆生在在平等俱得此無上之正覺正覺者此心不偏不倚如日懸中表影方正上下四方無不遍照無有不覺故謂正覺此從最初一點靈光不滓物欲而無論上中下三乘個個皆具此覺心上正字作證字解下正字作中正字解合而言之總謂諸菩薩今日聽如來之法者皆能發生此無可加上共正之正覺心者特未知所以住所以降伏耳釋氏言此句猶儒家言慎獨也獨則無對此是無上注腳凡事有對如先後之類是也説一無上便無配耦正事是從無始以來言猶儒家性善之説也儒家單説人如來兼説九種此是度盡一切衆生之意但人人有是明覺至上之心而不知所以修之之法者何故蓋緣善念方起邪念踵生故不得覺即覺之而不得至上之心也今問世尊此等男子女人既具善念云何應住云何者如何意也應住者凡人起此善念何以使之堅守不去而常住於心也雲峰又説應住不是強執定之而使之住只要於發念時見得真確便不走脫云何降伏其心者此心非另有一心也善心方解邪心即隨故須於邪心續起之時以大覺力降伏之耳降伏者如制毒龍如伏猛虎如禦強寇少不能降反為所制即降之而復萌其熾愈甚矣降而伏之不是強伏所住者常則所伏者潛消而默化此二句是求世尊一入門路徑雲峰再説應如是住如是降伏其心二句一串看不是應如是住又如是去降伏所當住者住之則所不當住者自然伏之矣只因人於不應住處住腳便多一番不自在心那住得久住不久時又去則所以制我者皆跳躍而至矣子真説佛言善哉善哉者讚其問之甚善也故呼其名曰須菩提正是儒家呼門人名一般意如汝所説説字即是下二句添如來二字者見得善保護眷念諸菩薩而付委囑托之正是佛之本意所謂因其問而發之也亦是迎機啓悟法言世尊説善男子善女人等有此無上第一等共證明覺之心便應如是住如是降伏也如是意是如來説人有所住之地而不能住則不能降伏其心矣故應於所住之地無有過無有不及恰好到此住位故佛言如是住猶儒家言知所止也止其所當止即是如是住注腳也人患在不知住便將此心付之烏有何以降伏故凡愚之心蠢而不靈中人之心觸而始動聖賢之心靜而能通者其分別區畫只在一住時相違耳何以故能住者適如其住而止不能住者有過心便落魔障有不及心即墮惡道人若於此得適中法則一切魔障惡道盡行銷歸住處而何有不降伏者乎唯然是應而信之之辭故稱世尊願傾心樂聞如是住二句之旨也聞言欲聞是須菩提見解欲進未進關頭故下即以正宗指示汝今諦聽不是竟説審視言汝今當以其微妙之旨審而聽之則為汝説者皆有真諦也大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之子真説爾時佛聞須菩提之請説而告之此一段文字是説入門大頭腦也須菩提三字是呼其名而告之不連下諸菩薩摩訶薩在內摩訶二字是大者之稱於諸菩薩中而又為大菩薩也言此大菩薩亦不過從此入門入門之法只是一個降伏其心前此言如是住如是降伏其心此專言下句者正以勇猛精進之法告也人心最難降伏惟能以勇猛力量及精進神思得步入步便是降伏功夫故應如是也但生類不一且概舉而言之所以有一切衆生之類此句是冒該下文九種而言數若字是二指點處非無想句不下若字已到實地位矣卵胎濕化單指物言不涉人類若有色下單指人言不涉物類言卵胎溼化四種之生各自不同而總一生也有色色字不專指情欲言人有此身即有此色故謂之色相有色則聲香味觸法皆為色動而即為色迷此有字仍對有色相者言若無色非專言無色也空諸相則著不得色而色自無矣有想想字不專指私稱言凡人有心必有想故謂之思想視聽言動從思想而出想之正則視聽言動皆正想之邪則皆邪惟其有想便有邪正二端故此想字仍從正邊説若無想則邪正之念陶融入化而想歸於無矣若非有想則想雖有而想已入微不見有想之迹故有想而非有也非無想句即從上句連絡無想已不落想矣非無想并不落無想蓋緣想入無上則心性明覺無可更著想處何有於無想若此想真落空處則前此從想而得者反墮落矣所以此句竟將以無量無邊作非字解也雲峰説我字是佛自稱皆字指上九種説令字是佛以覺性而通於九種之覺性故能令之也入字最有功夫不可作出彼入此看直是令一切衆生造入法門而佛以無剩義之法使之盡覺涅槃二字解者多誤有以涅槃為死者釋氏之誤也有以如來另有涅槃經者再誤也夫涅槃者是如來之真性明覺自有天地到今無分今古此真性常存不失所以如來以三世轉身法界如去復來愈到愈熟永無迷路故得以其真性與天地終始永無斷續謂之涅槃無餘涅槃者言此涅槃毫無剩義尚待補塞所以將此真性普度一切衆生也言滅度者不是生滅之滅是言如來度人全無形迹潛移默化使之盡行化度也子真説涅槃竟作到彼岸看是否雲峯説是是但不説得明白竟云到彼岸從何處作津梁故須以前之降伏二字下一杖子如無餘則不消降伏矣若論到無餘地位則涅槃仍是無餘有餘非涅槃矣求其無餘則亦非涅槃矣四字相連而解何有不明乎子真説滅度之如來有心否雲峯説有心滅度便有度不得處功夫不在滅度時而在降伏其心時如來惟不待降伏便能令衆生無不化度矣九種既分人物便有靈蠢如來如何令皆滅度惟不分靈蠢而皆滅度所以謂無餘涅槃也如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩子真説上文言佛滅度衆生而如來以為衆生皆有佛性皆可作佛則是此等無可限量無可指數無有邊際一切衆生俱是可以化度不以我之化度而成證果故謂實無衆生得滅度也雲峯説實無句是言如來以無餘涅槃滅度衆生到衆生滅度之後使九種衆生俱已入化則是衆生已無如來滅度之形迹故謂之實無有得譬如魚在水而忘水與之俱化何得之有此句不是如來自讚能度衆生正言無量無數無邊在在可度實由衆生可造入無餘而非我之功也何以故三字申明實無有句之故如來以為若菩薩欲滅度衆生而謂我之一身可以度之便先設一我相有我即有人人我相形便有人相有人相則前此九種衆生其中便分別靈蠢高下而存一衆生相矣有衆生相將欲以我之身永長於世而化度一切便生壽者相即非菩薩地位中人矣所以如來度盡衆生而不留四相故謂之皆入無餘涅槃也子真説如此説有我相四句是一串矣何謂四相雲峰説我相即是人相則雖有四相仍從我相而起妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住子真説上文説無有四相而此問正發明無相之旨是時須菩提從座起立而世尊使復坐於位次而告之曰所謂四相者不可住著於心故菩薩應無所住此問內有七住字上六住俱作執著意解末一住字仍作止住意解於法法字即無四相之法也應無所住者即下文色聲香味觸法是也六者謂之六塵極意執著人我衆生壽者四相緣此六塵便不得空諸所有故應無所住也無所住即以六度中布施一節言之亦不可以執著行之不可行者何如色聲等是色者形色聲者音聲香者馨香味者滋味觸者情所感觸法者法所引導此六項於布施時尤易漸染惟布施時不住色聲香味觸法想則亦無求福報想矣故言菩薩無住相布施蓋因人於布施時每每著相將謂我施於人人人可施而願世人同沾我澤而又願我常常布施四相俱不空矣其故實由色聲等而起就如見一人而思布施便動形色相聞一人而欲布施便生音聲相布施之時馨香滋味必求全美而又因求福德之心觸動欲使接引衆生同歸大法便是六塵不淨此段不重布施世尊仍為大衆説法而借布施一事以發明無住相耳布施者布陳己之所有而施之於人最著色相故世尊於六塵中單提言之子真又説上言無住相布施其故何以此句是申明上文意故言若菩薩不以四相六塵執著而行於布施其於福德不可思維而度量雲峰説上文既説無住相此又説到福德不是如來以果報欣動衆生只緣衆生布施一念求福者多故以福德聳動之其實是對下乘者説非謂無住相注腳也總之無住相中自有福德若求而得之便是有限何不可思量之有此二句上重下輕福德又在布施中説出子真説如來又言於意云何者是教須菩提於意中自去忖度一番説東西南北上下四維指十方而言也有十方便有方嚮而此十方盡屬虗空則無有邊際不可思維度量矣故如來問其可思量不而須菩提直言不可思量也言菩薩無住相布施其於福德亦復如上所云十方虗空不可思量也此段正言不求福德而福德自至蓋以其無執著也故如來説凡菩薩但應如我所教不住於相而降伏其心則此心便有定嚮而得所住止矣雲峰説此句結無住相而并結降伏其心之旨如所教説得自然不由勉強故能斷絶塵根一空諸相乃能住止若使諸相稍存心中有所更何住處子真説住在何處雲峯説住在空虗處子真説空虗處住得定否雲峯説空虗處住得久若涉六塵便刻刻欲遷矣何處是我安心處乎子真説布施一端不説到福德布施何用雲峰説若説到福德布施又何用子真説然則不布施者反有福德乎雲峯説布施有限福德無窮人若於布施前後打算一回反為布施所拘而果報亦從此分限矣故此段深言淺解與後義不同如理實見分第五須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所説身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來子真説此段是如來詰問須菩提以令之言下自悟意總發明上文無住相之旨亦是如來現身説法處故言心中揣度何如果可以現在説法之身相見如來否此句正是進須菩提一層也時須菩提於當下直認不也故稱世尊不可以今日説法之身相得執著之以見如來而復自解其故凡一切所見之相皆是虗空妄説無有實際故云見得一切之相非真相即知今日説法如來之身尚是幻相不可執此相以為見如來也此句明説人人有佛心而不可存佛相佛心刻刻在念無相而相真佛相或留於世有相而相假見得即心即佛不落障礙方為無住相也時佛又言此者正使須菩提認定非相是見如來之本旨不可又自疑惑也此段一問一答而問答中又一結以終不可以身相見之義正信希有分第六須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相即為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法子真説此段是須菩提於信後復設疑端以問蓋以上言成佛之言下言成佛之事是時須菩提聞如來説不可以身相見如來恐世人因此一言而并佛言皆屬空虗故白佛言頗有一切衆生得聞應如是住之言與無住於相之説及此經中之一章一句生信心而奉持否乎此段問意單恐人不見佛相但聞佛言而生懈心故言莫作是生實信之説此中章句不論世代遠近無有不信者即使如來於五百歲之前説此言而於五百歲之後如來此時僅有言在其有持佛戒而修福德聞此章句實實能生信心正以此言非空説而有實理也故是人得奉持其言當知是人之善根已深不特於一二善人及三四五之善人得此善根已於無可限量之善人至千萬善中會著源頭得此種子根深蒂固故聞此章句乃至於無住相一念中生清淨心信其實而無疑者則是如來之言雖世遠人湮而且信從況近代乎故又言如來不分遠近人人實信是如來之心無有不知之而見之者則悉知悉見之諸衆生應於清淨中得此無可限量之福德矣雲峰説人人是如來心則無不信人人信如來言則此心無不生清淨清淨心中便具無量福德正以此福德原不假求而得者故能得之無量也子真説悉知悉見則衆生即是如來何分衆生雲峰説已知者如來也見而知之者衆生也能見而知便可造如來地位矣子真説何以故者是發明上得無量福德句也此下作三段看蓋言是清淨心之衆生不可一毫迷戀若心中先有一相而取之以為我有即為著四相言為字者四相本無而我自為此相故下文不著為字而此獨添言之此段應單講下二段應對講大意云若心中著相則四相齊至此為不能空相者言下二段云若心中偏於有而認定法相取之即著四相若偏於無而認定非法相取之則亦著四相正以如來之法不可偏有偏無是故不應取法而徒托於章句不應取非法而竟落於斷滅正以是無住相之義皆不可以有無之心執著故也知其故則汝等今日聽法之比丘皆當知我所説之法不可倚靠正如渡人之筏方其未渡人人欲登既登而及岸即捨之不用矣則信今日所説之法尚如此筏而有可用不必用之時況於非法而可誤執之乎雲峯説此三段第一段言心取相者相隨心生也第二段言取法相者相隨法起也第三段言取非法相者因欲去六塵而未得無住相之真旨竟墮空魔了無所得是以非法相而生相也但下文只説法相非法相句而不及心取相句則知心字是貫串三段之義末句是足明上句並不深一層從來講非法太粘應專重法尚應捨句以見如來於衆生言説章句生實信後又超出章句便得如來真面目矣無得無説分第七須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説何以故如來所説法皆不可取不可説非法非非法所以者何一切賢聖皆以無為法而有差別子真説此段是如來設疑端以啓悟須菩提意故言汝今意中揣度如來果得阿耨多羅三藐三菩提耶蓋謂如來已成證果而於無上正等正覺果有所得否故如來有所憑藉而今為之説法耶此一問要見上文無住相而至於無法可説微矣但非法不可取易明也法而應捨則後之求法者無有入門處故設此以問耳須菩提即答云如我解如來有所説法之義其實無有定法名此無上正等之正覺亦無有定法而為今日如來可説之法也雲峰説法不可定者不是千條萬緒多而難定只因人人有此正覺便應直造無上一泥於法即落窠臼而覺性反為法泥下句説無有定法而下一亦字是連上句説下見得如來得之於己與喻之於人皆從性真活潑潑處發出並不有成法而為説法也何以故者釋上無有定法之故言如來説法皆不可以一定之法取故不可以一定之法説所以如來之説法不可説是法非是法也二句三非字一作是字解一作勿字解是法則有實相勿字法則落空相非有非無法無不備乃為無為法也故即解云所以説非法非非法者何以故蓋緣如來所説之法原從覺性中來不倚於法者若有倚則必有所取取者因我之所無就彼之所有以取之便知法在外而不在內不可取者非謂法之不善而不可取如來所説之法俱從覺性説出則凡假法以説者法雖善而皆不可取矣惟不可取則亦不可説到此説不得是法亦説不得不是法矣非法者我明上無法可説句非非法者我明上法尚應捨何況非法二句絶不支離則知一切之菩薩而稱為賢如來之地位而稱為聖皆不假造作強為而實以無為之法造成賢聖但其中先知後覺各自不同故以後覺者為賢先知者為聖而微有差等分別耳究之其原同出於無為之法而未嘗有別子真説無為法正照上文一念生淨信句淨則無為不淨則紛紛錯起而為之不勝矣雲峰説無為不是一無所為縱為之到底仍返於無為人若未嘗有為先求無為便是踏空而行何有實效人若既經為過但恃所為則又踱實而走何有靈機所以法至無為而幾幾於賢聖矣依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非德福性是故如來説福德多若復有人於此經中受持乃至四句偈等為他人説其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法子真説若有人滿三千大千世界三千者舉成數而言大千者又以三千之數言猶云三千箇三千此極言世界之多至於大千多之已極而又滿此世界無有脫空將此世界之七寶用以布施七寶者金銀琉璃瑪瑙玻璃珊瑚明珠是也此七寶者世界中之希珍用以布施其所得之福德多乎不多乎此一段又借布施一端以啓其問而須菩提直言多者亦只就布施言其多耳一問一答俱是設詞不作實有如是布施以得福德也雲峯説如來即言所得之福德仍是性中固有不假布施而有增益何以故是知來發明福德多之故故言福德本之於性何處計其多少則知言多者猶著布施相見得布施如此之多而得福德究竟返歸性分不著多相是故如來説得福德之多耳子真説四句偈不單指四句言故説一等字有經而後有偈故下乃至二字則知四句偈前後皆偈矣受持二字各有解受者口受持者心持能口受心持而復為人解説此經中之義則其所得之福更勝於布施之福何以故者解明其福勝彼之故蓋以一切已成正果之諸佛及將成正果之諸菩薩而會悟諸佛無上正覺之法皆從此經中解出真義故呼須菩提言此即佛法也而一有執著於法便非法矣雲峰説此一問答只重受持為人解説二句上句自修功下句及人功一相無相分第九須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者子真説上文言佛法無相而無相中其實有果但相不可著果亦不可定故此段以四菩薩之四果言之以見四果一果進一果而究竟以果名者猶是法門之小乘其須陀洹斯陀含阿那含阿羅漢是四等入道進修之人其名不同證果則一須陀洹是梵語之稱即譯作下入流二字下三段皆倣此如來言須陀洹者能作是證果之念我得其果否乎而須菩提答云不也蓋以此須陀洹者於六塵中脫出能生清淨心故已入於賢聖之流而究之何所謂流便是入焉俱化則不入於人我相而何有於色聲等故雖名須陀洹而實無可名也此為初果斯陀含者較之初果則已進矣名一往來者曾於此中往來一番也凡人於塵相有一往而不來有既來而復往者此則曾於其中一往來而絶無顧戀所以謂之一往來也則名為斯陀含而實無可名也此為第二果阿那含者較之第二果則又進矣而此阿那含於六塵四相一一證空并無可名而特於此中通徹前後了無障礙故不特不往直已不來覺得塵相已無有可來之迹此為第三果阿羅漢者較之第三果則更進矣而阿羅漢實無有法相者蓋以阿羅漢見道而不著於道也若其見道而有所著不過成其為阿羅漢之道而已豈能脫此四相乎故雖名為阿羅漢而實無以名之此為第四果凡此四果各就地位同證無上無非説不著一果而成此果耳雲峰説四果果字一義也因果證果各有分別因果者以前之所因而得今日之果證果者以今之所證而得當下之果也果字有二義一果決之果一果報之果此應以果決義解蓋以四菩薩俱從勇猛精進而堅修以得之者入流一往來諸名正是證其果處世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊即不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行雲峰説上四果俱以無心而得果者無可名之故強名為四果之人究竟實無所名也但上三種人言得果下阿羅漢言得道果與道其中淺深不同須知道字實高果一層故下不説果只説道耳子真説無諍者無所諍也人心一念欲明理又一念欲驅欲兩念相爭便內自諍矣無諍則理欲消忘不起諍念是為無諍三昧者梵語也譯之則為入定雲峰説無諍者非諍於口諍於心也無諍在儒家則曰內自訟在如來則曰無諍人有過而自訟則過消人至於無過之可訟遂到無諍地位夫無諍則善念亦且消融從何而諍所以然者蓋因此中已至入定之會更無有所相持而寂然之中萬感不動故得一定而無所擾也三昧甚難發明我當解字義以充其義三昧二字世以為三昧火者非也因以其名而釋氏誤謂無明火後又誤以無明為無名去三昧之解遠矣夫三昧而解作入定者從無諍譯説也若云昧之一字直以明昧昧字解之為近蓋人不覺則昧若正覺則不昧矣昧從心生則心為昧所掩而往往多迷故世稱昧為迷昧正覺之人心有慧燈古今常照一切塵相更無有昧此昧字義之粗解也雲峯又説三昧云者凡經中三字俱作正字解而此言無諍而得正定之心也以今所説昧義當云無諍之得得之於正直從無昧處以歸於正覺也此亦從實義説言三昧者未嘗以此解也恐釋氏以為説之膚淺故向未言其實今照正覺而銓三昧則亦不脫章旨要之不能覺則昧或有覺有不覺則或昧或不昧至於正其覺則亦正其昧矣何必紛紛多其説耶且看下文人中最為第一句便知仍是無上之旨總以見正其昧者是第一等人猶之正其覺者更無有可加上意也子真説得無諍三昧得字照上得果得道説來比前又深一層故説最為第一最為第一不但是三昧中人又在於三昧中作第一等人是為離欲阿羅漢離欲者離此六塵四相而至於無諍便是與欲相離非強遏以隔離之故説我若起意思説我是離欲阿羅漢即著離欲之想而執阿羅漢之道故又説我若作是意思而謂我已得阿羅漢道如來即不説樂阿蘭那行者矣阿蘭那譯作無諍二字樂是好樂意蓋謂此時若以離欲之想自存則佛於諸弟子中不以我為好樂無諍之行者行者作修行人看正以須菩提實無所行其離欲之心故謂之樂阿蘭那行耳此段是須菩提自言以無心而得離欲之果則上四果亦以無心而得愈明矣莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴子真説上言得果説一得字便著一得之相故此如來又將己之所得而問須菩提以見得之心不留也故言往日我在然燈佛所授記之時於法有所得否乎然燈佛者即今世所稱定光佛是也佛生時有光於眼耳口鼻百孔中放出遍照十方如燈之明而號然燈也是為釋迦佛之師此一問是看須菩提認真得字否而答云否者見得當時授記時實是如來於本性中自得真悟仍不專靠師之授記而得故得之而實實無所得耳此問單空一得字而佛又問菩薩莊嚴佛土否乎莊嚴者心入於定而不著依倚也佛土二字即菩提心也言菩薩果以入定無倚而具此菩提心否故答云實無此心也何以故佛説此莊嚴原無此莊嚴之想故謂即非莊嚴而特名之為莊嚴耳土字是就菩提心入定者言人於操心時存一分競持意心便不定説到入定心無可持正所謂無為法也土即土也土止而安是為良土即以此解其義得矣雲峯説土字即解土字義亦是實説蓋人心能如良土之止則自然入定言心而曰土者猶人之言心田心地心苗等意也此心方寸之地而能種出良苗便知方寸本是良田故謂佛土不去侵削而加滋培何在非佛土也雲峯又説自須陀洹起直説到菩薩層層駁入俱是須菩提善解處言四果中人即答以小乘之旨言阿羅漢即答以無諍之旨言佛即答以無所得之旨言菩薩即答以非莊嚴之旨隨問隨答而中間須菩提自説佛名之一段是須菩提以身自證之意佛又説然燈佛一段是如來以身證須菩提意針針相對絶不支離當以此番問答為兩人本地風光是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身子真説上文得無所得而莊嚴之想俱無此心幾於枯稿故此段説一生字以見諸想皆空而心從虗中生出凡須菩提等應如是而生此清淨之心心至於清淨則六塵俱斷而何有於色聲香味觸法以住其心清淨心言生而六塵亦言生者二生字有別上生字言心中一無挂礙而生此清淨心下生字因六塵所染而心反為其所生一正一反則出下句應無所住而生其心句無所住不是懸空只為形相消忘心中毫無執著此心油然自生不曰心之生而曰生其心者無所住中生之也雲峯説蓋心至虗而不可有所所者情欲之所也心為人之安宅而宅為情欲居之則不安矣住字猶居住一般因其有所住而人之七情六欲皆足以汩沒其心此心便不能生無所住者不是六塵之來強拒之而不使其住實實心中原著不得些子仍無有可住者故於無所住處而生其心也但此句一連誦下不可於無所住作頓蓋不以無所住後而始生其心也不言心之生而曰生其心者正以心本虗靈原存生生之理特為情欲所制生機漸消故入於一念不起時此心有油然而生者非他心其心也人不能使之生而心自生之則知其心者本然之心也夫心説到生時便覺有一番勃勃意矣此一句之大旨也雲峯又説上言心下言身者非反説到外也身字即作心字看如來蓋欲廣須菩提之心而復以須彌山王之身問之耳如來設言有人身如此山之大而非真有此大身也須彌西域山名為衆山之長故曰山王其身如山王則大之極矣而實無此大身之相若存此相大便有限而佛亦不説之矣此段問答言無所得無有莊嚴而至於心無所住則此心方為廣大此又是如來開悟須菩提一則也如來於辛丑四月十五日降壇説法雲峯譯解大旨如來説無所住而生其心全是心之覺處生之無所住者心中盡是覺處不應住的走不得來躲閃便在在皆明覺之生心靈光透出何生之非其心此是説如是住精意可將如是住三字看出如來又説此句不看住究竟但看住由來究竟則應無所住由來則生其心言人若住不住於在歇腳處便能生出一番明覺心來溥仁説即雲峯名可以此經問須菩提否如來旨留阿難行者再發明此句經義阿難尊者説色聲香味觸法未有住處尚無其所一經住著便已各占一所而不得即行故其住之也久而所住之地為其紛擾遂不成其所矣無所住者未嘗不有其所而不引之入住即有色聲香味等項俱是門外過客安得投足於不招之所耶故經文言應無所住是應與不應俱從自心招攬自心推脫別非他人可以承當直是其心自讓所住與色聲香味等住而其心反退處於四絶之地從何得生惟無所住而其心廓然淡然不留一物占其地位欲培即培欲植即植譬如良田無莠所承雨露所滋灌溉皆是扶生之會而何有不生者故上言兩生心此單言生其心足知生處木是浩曠何嘗絶人於生特患生之未久又從而絶之則此心將不得為其心其不敗壞於色聲香味等者亦幾希矣無為福勝分第十一須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德子真説上言山此言河俱是喻説此段甚言世界之多如恆河沙故如來言之恆河西域河名即在佛説經之處故即以喻言如河中之沙而以一粒之沙算一恆河可為多矣而須菩提謂如此恆河尚無可算故如來告之説此喻非是謊言而實可信見得世間善男子善女人以此河沙之數七寶布施於人其福德之多亦猶是也然不若於此經中以四句偈受持而為他人説其福更多於布施之福德前説於此經中受持乃至四句偈等此説於此經中乃至四句偈等有別前兼言經此單言偈見得以四句偈等與人説其福亦是無限蓋布施必待七寶而得福此經與偈則無論貧富窮達隨在可受持解説耳尊重正教分第十二復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子子真説復次與前微別蓋與如來説法以來至此幾復次矣此段是言受持解説不論何地處處可以説經故言隨説若隨地而説此經與四句偈等即有天上之神世間之人及八部中阿修羅之惡類一切等皆應於此地生恭敬心而供養之如佛之藏舍利之塔與現法身之廟所在之處無不瞻禮塔廟蓋借言耳非真有塔廟也何況有人將此全經之義而廣為人解説其為天人阿修羅所供養者更何如也且不特以四句偈等及全經隨地解説即使此經留於其地便同如來身歷之地未嘗有佛而佛實即在且不特佛在并及所持戒修福而為人所尊重之弟子亦無不在矣雲峯説若字作及字解尊重弟子竟作諸菩薩摩訶薩看上言佛此言及佛之弟子便見千二百五十人皆是可尊重若如來者如法受持分第十三爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛説般若波羅蜜即非般若波羅蜜是名般若波羅蜜須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多子真説上文如來説經典如此之妙故須菩提因問此經當以何名既有經名何以敬奉而心持之而佛告其經之名則名為金剛般若波羅蜜金剛者金性純而最堅故謂金剛般若者譯作智慧二字波羅蜜者譯作到彼岸三字言人智慧之性從無始而具不著漸染如金之出土純潔而無所夾雜惟其無所夾雜則私欲不得相人何等堅剛今人為私欲軀遣便自柔軟而失其本真則智損而不明慧削而不悟以至汩沒本性不得登岸矣惟率其最初之性而以性中固有之智慧堅持不使一毫有虧則回頭即是彼岸此為小乘者説般若法若大乘之賢聖如諸菩薩等則此般若之性本來具足有何侵損到底堅剛其登彼岸猶入熟徑前後不迷永無退步登彼岸者為大乘解則為登峯造極為小乘解則為出此入彼所到不同而彼岸一也但疑之者迷而不知到畏之者望而不能到是在於勇猛精進者此經之所以名也受持者當奉行此名而可得經中之實義但此名不過強名之耳蓋以般若即具於性有何可名故佛又説非般若波羅蜜也若一執著其名則落相矣惟旋説而旋非是以名之為波羅蜜也言般若即為般若之法而佛又問於法有所得否者説此般若波羅蜜之法也而須菩提言佛無所説者正以此經之名不可執也故佛又借世界微塵以喻之言三千大千世界中之纖微塵埃何處不有可謂多矣而究竟微塵不可盡執之以為微塵猶世界不可盡執之以為世界蓋微塵而至於破碎世界而至於陸沉則又何可名之有雲峯説上句形起下句重世界一邊説如來至此又將三十二相現身説法三十二相者只就如來幻身言之耳此身雖與衆生不同而究竟幻身有盡故説以身相見如來而名為相即便落相特強名為相以見如來耳三十二相一身相修廣莊嚴容儀端正二體相上下量等端肅三面相而如滿月四頂相頂如天蓋五髮相右旋盤曲一髮不亂六耳相耳垂過肩七眉相皎淨如天帝弓天帝弓者中高而兩垂八眉毫相眉間有白毫柔軟若綿白若珂雪九眼相睫相青紺色平整若牛王牛王者眼大而左右齊整不偏十眼睛相青紺色鮮白眶微紅十一鼻相豐高而下垂十二唇相唇若丹朱十三日相閉若瓠形開若海口十四牙相上下四十肉深根固整齊白若珂雪十五齒相四齒潔白鋒利十六舌相廣薄修長吐垂面輪至耳髮際十七音聲相聲音朗朗雖人衆中遠近共聞十八額相方正隆準十九肩相兩肩平正圓滿二十臂相平立雙臂垂過膝如象王鼻二十一脅相兩肋圍抱如鹿王腨攝二十二毛相皮上每孔生一毛青紺色軟如兜羅右旋不亂二十三皮相金色肌膚柔滑不沾泥垢二十四陰相藏密不露二十五手足相並柔軟如綿二十六足底平滿足下有千輪輻文二十七足指有雁王文狀若綺畫二十八足趾坐與趺相稱趺與距相稱二十九手足並尖圓修長潔白可愛三十兩手兩足雙肩一項並圓滿三十一頷臆周正充滿三十二腋下並充實子真説如來之相雖與衆生不同而終是幻相所以説非相而強名為相耳今人具有幻相而能空其相將此身命如恆河沙等以為布施可為極矣而終不若以此經受持解説其所得福德亦復如布施身命者正以身命有盡而經義無窮也離相寂滅分第十四爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來説明實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來説第一波羅蜜即非第一波羅蜜是名第一波羅蜜須菩提忍辱波羅蜜如來説非忍辱波羅蜜是名忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨子真説爾時須菩提聞如來説此經中空義了徹不覺涕淚悲泣感其説中之義趣而白佛言自我從昔日受教以來所得如來慧眼未得聞此般若之經蓋嘆其聞之晚也若復有人如我今日所聞而亦同得聞此經信之於心而萬念皆空此心清淨即以清淨心中生出實相來是人即為第一等少有之功德矣雲峯説實相二字是如來實地功夫若未從實相處修持泛言空相便落寂滅何處發生故言實相以使人從此實地生出空相若未經由此修持何處著手故於空相後反説實相生者不是生此實相蓋從實相內生出空相之旨也上言福德此言功德有別福在於能修功則自修福已至後言之正照上希有字説子真説是實相者不過借以生空相之資其實實相不可執著特強名之為實相耳而須菩提又言我今得聞此經賴有如來親承面誨不足以為難聞若當五百歲之後而此來世衆生不及見知俱是聞知其得聞此經者皆能信心是人實以己之智慧即證如來較之我聞甚為難得豈非希有何以見其希有之故此人已是超脫四相而無人我衆生壽者之見矣所以無四相者何故蓋人我等相俱無可名即無可著而後之衆生不及見如來但解如來經義豈不是四相皆空而即名之為諸佛中人不亦可乎如來直應之曰如是如是是接引後世人意不但答其言之是也故如來即言若後世復有人起而能不生驚駭心不生怖懼心不生阻難心便能勇往精進悟入法門豈非希有之第一等人乎而又不特不驚怖畏之一等人也即如辱之所在人不能忍而有忍之者是即入法之一門故如來説箇忍辱波羅蜜忍辱二字最難人若有辱而存此忍心便與辱字不能解脫故説忍念皆去辱自消忘而何有忍辱波羅蜜乎言此不過強名之耳第一波羅蜜即從上希有二字發出此一段總於如是如是內説來見如來接引後世衆生入道之意耳蓋以此經為萬法宗源凡所有經典皆從此一經會出是為第一波羅蜜也但波羅蜜不可執著如來所説不過借此以度人故強名之耳而何可據以為第一波羅蜜哉且不特此凡人之最難忍者莫如辱可見人之於辱不惟能忍為難而忘忍之尤難何以故如昔如來為歌利王割截身體時可證也歌利王者西域國惡王名嘗率宮女數十人出獵晝而酣寢適如來過此而諸宮女見以為神人羅而拜之歌利王覺怒其為戲而磔裂之故如來借此事以證忍辱并忍辱皆忘之意其言若謂此時節節支解絶不生四相蓋以此時若生四相則瞋恨之心不免所以無者忘其辱并忘其忍也須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住是故佛説菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來説一切諸相即是非相又説一切衆生即非衆生須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成無量無邊功德子真説故又言我若會得忍辱一法則於過去五百歲後當作忍辱仙人此如來發念如此未嘗實作此仙人也故説於爾所世自從今日想到此世如同一日更無別念可岐所以究竟無有四相是故應離一切相如來説四相皆空則一切之相盡應解脫而離之矣一切之相離而生清淨心此時心中明覺得無上之旨會無上之法實實發此正覺之心而何有於色聲香味觸法等住於心乎此六塵既無所住則心已清淨而所悟皆正覺若心中稍有所住此心終為六塵把持而何有住止之處雲峯説此一段上四住字作住著看末住字作住止看凡説色聲等必以色字單提一句見得下五字皆因色相而起故下文除却聲香等專以一色相説布施耳子真説菩薩於法應無所住行於布施布施而單説色者凡人之念只為功德修於目前福報留於身後便是刻刻為自己地步非普度衆生之大法願矣故言不住色布施不特於六塵中生此吝惜眷戀之意而為有住即使盡蠲一切不忘求報福德之心終著色相所以説無住相布施也故菩薩為普度衆生而以布施利濟益物布施原為人而非為己是應如是也所以如來又言我今日所説之經不論歲久人湮無有不信從者益以所言是真而不偽實而不虗適如其心之所言而不加毫末不減分寸不以虗誑之言而使人惑不以異同之言而使人疑則是般若一經不分世代遠近不論人造就淺深受持解説俱是明白曉易正以所語之如此也而又言此數語者即法之所在此所説之法以為實有而六塵四相皆空以為虗而四果所得皆有正從此無實無虗中説出所以久而可信也雲峯説虗實二字合説有味虗中想出實際實中想出虗理靠不得實著不得虗虗實相形乃成如來妙法子真説無實無虗之法如來於此已經説出要領故又言若悟得此法則是無所住之心在在皆然矣即以布施言若菩薩此心住於法而行布施心為法所拘便如人入暗中一無所見若此心不住於法而行之則觸處皆通無有障礙便如人之有目加以日光照之有何不見此段言法之所在必能空而後能照甚言執法者之不得法也故又言若有善男子女人能於此經中受持解説雖在當來之世是人已得聞知而同見知可成如來證果即到如來地位無論世遠於五百歲而佛之智慧自然遠照悉知其人皆得成就不可思議功德説無量無邊者言人能如此則人人可為如來世世見有如來故説功德之無窮耳雲峯説此問是如是如是以下通説後世奉持此經之人如來反覆申明終在於無實無虗一句結穴後説以要言之而不説要言在於何句者正是如來不以一句實法使後人執著也持經功德分第十五須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者説為發最上乘者説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德子真説佛又言若後世有人於一日之內初日中日後日三時間以身命布施而如恆河沙之多且歷百千萬億劫之久其布施之功極矣終不若信心於此經之功尤大也初日早時也中日午時也後日晚時也日有六時舉此以槩終日耳恆河沙之多百千萬億劫之久俱是借言非真有此等身命也身命人所重者以身命布施甚言七寶之珍不若身命之重而并捐之其布施何等大願不是如來教人撇却身命也釋氏於此段最多饒舌須訂明之言以此等身命布施有人能以其心信實此經而無違逆則其福自勝於彼之布施者夫以一心信之尚屬己修之功何況書寫傳布受持讀誦為人解説則不惟自度廣以度人其所成就者寧有量乎故又言此經後人得力如此而究之説經之要原自無多不過於空相空法無所住之旨而已故是經有不可思維而議論亦不可稱算而度量實實其中有無限量無邊際之功德其要不在多言然此經中之要如來原為大乘最上乘者而説大乘最上乘之人要皆不落法相者也故又言能以此經後世有人受持讀誦以自覺廣為人説以覺人便是如來真心相印雖在如來五百歲後而如來早已於慧覺中悉知悉見之其心合一故必其決然成就此不可思量無量無邊之功德正以受持讀誦為人解説之功更大於今日説法功也雲峯説大乘者諸菩薩是也最上乘者佛如來是也為大乘説者説此六塵四相之應空而入於法也為最上乘説者説此空相之心皆歸於空而并無所謂法也第一句是引衆生而證入諸菩薩第二句是引諸菩薩而證入於佛如來也此正是以要言之之意而絶不説要言是何言者正是如來欲度人而不留一度人梯子處世間只有上乘之人入聖至易惟有中材之人超凡最難故如來於此段往往從第一等佛菩薩直説到學為佛菩薩者亦是成就中材處而不使其恍惚無所據故實實以成就直造如來地步告之耳雲峯又説乘即車乘取通遠之義乘有大小上中下之分其乘則一乘有輪始可轉行故以法為法輪有法而不能流通猶之有乘而不用以行遠所以諸經皆謂之大乘者正取義於法輪轉通之意也此乘字又別有解夫乘車也乘一而乘車者之人不同所以有上中下之分若舍此三種人便如徒步者之難以行遠矣故人得居乘中當思堅其輪輻不使有折轅覆轍之虞則居是乘者不論上中下人皆可以負重致遠人若棄其乘而不居又自甘於徒步及至車乘朽脫雖欲乘之不可得矣但此中何以分上中下上乘者不勞餘力而即可通達中乘則必加鞭策而後能馳驅若下乘則又如駑馬而駕敗車稍不加防即有前車之戒所以雖曰乘而幾幾乎非乘矣此上中下乘之大略解也至於最上乘則又有解蓋最上乘即從上乘而得超乎其最猶如車之輪轅堅固而更駕以良驥所謂不加鞭䇿萬里可通此真造父之車世希御者是又最上乘之大略解也若下者造而及中中者造而及上上者出乎最上則猶之並車而行努力者在前弛鞭者在後豈嘗限人以上中下哉如是人等即為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解説須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處子真説如是等指上受持等而言言人能若此即是能荷擔之人背負曰荷肩挑曰擔言此人是能身任如來阿耨多羅三藐三菩提之責者其人之成就何如乎何以見其荷擔之故若人已是大乘最上乘之人而非樂小法者蓋能荷擔必是四相皆空而并空無相若人所好樂不脫於小法面沾沾章句之末即為著四相矣豈得有如是之大功德乎故知以此經自覺覺人者終不樂小法也此又反言明大乘最上乘之旨在在處處隨在有是經也言有是經之所則天人阿修羅便於此處恭敬圍繞如佛之塔正以經在即若如來親在也所以天上人間無不敬奉以華香而散其處耳言散華香者非必實有華香不過極言恭敬之念一物且然他可知也雲峯説荷擔而上加即為二字便知其人不可多得者向解荷擔只説背負肩任特釋字義耳若説二字之旨直是如來欲以正覺之性付托其人而一任其荷擔矣但既經荷擔便脫不得肩必待更有能荷擔者而與之此如來以後所以有五祖之傳流也能淨業障分第十六復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議雲峯説此一段又為下乘者説法蓋從四果起至此直説到有罪惡之人已是無可醒悟而能一旦得醒悟受持此經亦可消其愆而釋其過此又為下乘開一自新之法門也從前不説果報而此段説出單為下乘人開其感動奮發之機耳子真説先世二字不可專作前世看如來説經仍不曾説得玄空此直是昨非今是話頭切不可以前世後世渺茫難信者為庸愚藉口反失經義故言若有人於前日作此罪惡自然應墮惡道矣猶如人從前作惡無可躲避刑罰一旦改過自新從於善道即為善道中人若人之目之者尚以為惡道中人而輕賤之其實人雖輕賤若人先前罪業固以氷消而熄滅矣此段舊説多引證宿世今生事以講亦是不必蓋其人能悔悟則前者盡除其惡來者日進於善即當得如來之正覺矣故又言我念此身過去以後人當歷無量阿僧祗劫阿僧祗者譯作無數二字言人無有如來化導之則沉淪於無量無數之劫者多矣然有此經在可以救之但如來此經其實於然燈佛前得相值百千萬萬之佛悉皆敬奉承事之故得與之參究宗旨而無一人空過不與説明此經義者那由他三字譯作萬萬二字解言此時之佛實有千千萬萬耳蓋此時有如此諸佛而如來不肯一人放過箇箇與之參究此經而得經中之奧若來世有人能於此經受持讀誦雖目中不見有諸佛而其受持讀誦之功德與我昔日供養諸佛之功德直是百不及千千不及萬蓋言我所得者百分而彼得一分勝於我之百分我得千分而彼得百分勝於我之千分正言我所得有諸佛在似易彼不見如來在而單信此經較難故言乃至算數譬喻所不能及者甚言其功德之大以欣動下乘之人然是經也如來未嘗具説而反使人惑具字作詳字解雲峯説如來何以不具説蓋以此經俱是對上乘言而撮其要者一句中可該萬法之旨故上説以要言之也若下乘之人即以要言告之全然不覺而欲變其説辭約者反煩要者反多此於前説又加詳晰如來非不欲如此其如一經具説而下乘之人便謂如來與上乘説者又與下乘不同則將疑如來説之不一其心因即於狂亂矣何以見其狂亂蓋如來之經不過真空之理末世不明其理遂有假托如來之人偽造經典以贋亂真庸愚反為所惑而心即於狂亂以致如來之經反生狐疑而不信之此如來於説經時直料到末世必有此人必有此事所以不欲具説耳雲峯又説此處果字增一報字比前四果果字不同前説得深此説得淺前果自證自果後則以果得報果得報限矣此段全要發出下愚自新求善而又恐其為善不卒以至於狂亂狐疑故終以果報結之是如來引導庸愚之一片婆心也究竟無我分第十七爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我受記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我受記作是言汝於來世當得作佛號釋迦牟尼子真説上言功德不可思議如此故須菩提覆思前之所問應住降伏之説亦不可思議故又舉所以住所以降伏者是善男子女人發此菩提心而得之究竟何以有此住與降伏之心也此一問是須菩提因不可思議而又申明無我之旨故佛言凡此發菩提心者俱是有佛性自能返照而生如是之菩提心原非佛之可教以發出者故如來化度一切衆生至於化度一切衆生成佛已則是衆生箇箇皆佛如來心中何嘗存此衆生為我之化度故曰無有一衆生實滅度也解佛所説義義字是指上實無有法義故又言實無所得正覺心得後則忘其得并忘其法矣故又言昔在然燈佛所受記時若謂我既得法為來世化度衆生之人此時受記師即不以我為當得作佛而有當得作佛之名號釋迦二字譯作能仁二字言能以至仁之心而普度一切牟尼者譯作圓通解言有此普度一切之心而能圓通四大無所不遍毫無窒礙也此是當日命名之意如此故如來又言我惟不存得法心所以受記時師曾作是當得作佛之言而以釋迦牟尼名之雲峯説化度在如來生如是心在衆生不自生如是之心如來安從化度之夫至於化度已則消融人我在在皆佛何有化度之心可留故又言菩薩欲化度人尚有我人四相即非菩薩地位蓋以如來之心空諸所有毫無染著不以所得之法存一得法心故能證此無上正等正覺之心也如來既言法無所得即以己之所得於然燈佛者復問須菩提欲使己得之法亦不留法相故問昔在師所於法有所得否須菩提直見以為實無所得正悟如來之得法得之於心不執師之法以為有得故佛言如是如是不但稱其言之是而謂我之所得真在心而不著於師之説耳此皆是無我之意言以心得而得成佛不假師説方為真得悟入於得無所得乃稱如來之義何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來説人身長大即為非大身是名大身須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來説名真是菩薩子真説何以見其無所得之故蓋如來能了徹一切之法而得無所得故即於空諸法而悟如如之義雲峯説諸法如義是如來説經要旨言即此諸法千條萬緒而其一貫之旨總歸於如如二字如則無不如如如則無所為如故言如義而不言如法如如中著不得法相也如來者以其無所不如而能靜中生照虗中起白若鏡之懸內無毫髮障礙憑物之來適如其來以應之影過不留仍存虗體故無有來有不來而來亦無有如有不如也言諸法而同歸於如義正是百川之流銷歸大海不見增益無不容納此可以悟如義之所包者廣又何有一法之可獨名乎子真説如義若此而復有人言如來必有所得正覺而後名如來者是不知如來之實無有得也何以見其無有得之故蓋以得之於真性者性本無法故其中據以為實則全無𠙖藉見以為虗則觸處圓通無實無虗法安所施故又言天下之可恃者皆法也法至一切則無論大小矣然此一切法者即之則非體之自實雖有一切法彚於一法而一法之法原無有法故雖云一切法不過虗名之耳亦何可執乎故又言人身之長大以喻一切法之多然此性不明覺雖有長大之身終為虗殼亦何所用以喻雖有一切之法而不能得之於心則一切法總屬成法依樣葫蘆何嘗自我本性中獨得之真諦所以須菩提直言如來所説人身長大者不過虗名之耳長大之身安足據乎雲峯説自如是以下至諸法如義句前後照應而此段所喻是承上起下之詞子真説上言無有滅度法豈惟如來無之即菩薩亦如是矣蓋以菩薩通乎佛性所差一間若使菩薩作是言謂我當化度無量之衆生便是執於化度之法而不可名之為菩薩矣夫迷者衆生悟者是菩薩以衆生待人以菩薩自待即是人我相矣焉有菩薩地位而尚存四相者故又言佛無人我衆生壽者相也言佛則菩薩之不落於化度法可知故如來又言菩薩既不存化度心則心中清淨可知然使菩薩有心而求清淨此心即為清淨所拘矣所以菩薩不作是言以為我已莊嚴佛土蓋此心已至於莊嚴便已脫却莊嚴形迹特無以名之而強名之為莊嚴其實何所為莊嚴乎故又言若菩薩於化度法莊嚴法俱已空相則知此身非身此法非法而已通達於無我法矣是真名之為菩薩也雲峯説一切法而獨提布施法言為衆生説一切法而單提化度法言為菩薩説也上言六塵而單説色相以聲香等從色起也此言四相而獨説無我法以人衆生壽者皆從我而起也説無我法而謂之通達者通於此而達乎彼也彼此無礙便是一箇正覺心何所容其為法乎此處説無我不言心而言法者是如來指點菩薩空法處不是説盡無法而又留一箇無我法使後人存疑也一體同觀分第十八須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意去何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼子真説上文言無我而此又以五眼問者正是如來不作寂滅之説也蓋眼亦我身中一官無我身便應空眼相不知無我相者無我身之纍而非并身無之也此身之纍盡忘而我之慧性便從眼光透出所以有此五眼如來之問五眼一步説深一步須菩提之答五眼一步見高一步俱是針針相對處肉眼者色身之眼人有色身即具此眼而或有瞽眇之不同有明昧之各別至於具有眼光而一見正一見邪者此肉眼之所以相遠也凡人與如來同此眼而如來有之便能從此眼得證上果則謂如來之肉眼可也天眼者言眼界甚大而能普見一切衆生無所不入其眼也善惡邪正若登高視下纖毫畢見此從肉眼證果後得之也慧眼者眼光甚明能使一切衆生前後世事慧光一照九種盡皆明白而無可廋麗此從天眼中看出正是見之大者見之明也法眼者所視一規於法而見正不見邪見善不見惡是以我之大且明處見為萬善同歸之意也佛眼者見天下衆生皆可成佛而并無善惡之分正是開眼憫衆生合眼盡法界而無所不入其眼也此五眼之大略也雲峯説五眼是一眼分言之有淺深合言之無高下如來有五眼凡人亦有五眼其中分別處只從肉眼而始若以後四眼説來此解尚有未盡可再解之肉眼者有色身即有是眼也身之肉眼為一官而惟眼與心相通故心之邪正獨形於目目之所視心每為其所引若心不處於虗而眼著於相矣故謂肉眼然如來之肉眼能見己身生滅則與凡眼不同特此眼自有身後得之與身生滅所以不可為據耳但如來以一眼見己之生從此來滅從此去無所昏瞇所以必從肉眼入門也天眼者借天以言大且高且遠耳人以眼望天而不能窮天之際天以眼視人而能悉人之微以其大也大則無所不遍高則無所不燭遠則無所不及如來能具此眼便能遍滿十方界而能以一眼通之此謂之天眼慧眼者其明足以燭幽察微晰及毫末如來以三世之慧光具於眼中不徒見一己之生滅去來而能見衆生之種種色相如日月之明容光必照故謂之慧眼法眼者眼之所見一合於法而使非法之事不得再迷故如來曾以法眼看出阿修羅之假道亂真能使之反魔入正是皆法眼所得也佛眼者以其眼之所見無在非佛故於一切衆生能以大慈悲心發之於眼而使衆生無不成佛佛眼一見頓成菩提所謂開眼即是度世也須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得子真説上言五眼具足便可悉見人心而非心亦無不見故於五眼後説出三種心以見非心之無不可見耳恆河沙一段從沙説河從一河沙説河數如沙之數反覆轉曲總是説到佛世界之多耳言有一世界必有一佛居之而世界之多與佛之多直與恆河沙及如沙之恆河之多則是滿世界皆佛故謂之佛世界也佛世界者世界皆佛所主持有一世界即有一佛主持之分而至於諸世界則主持者亦有諸佛蓋言世界中在在處處皆有佛也看下爾所國土中句則知分世界而化度之説是已夫有世界即有國土有國土即有人有人即有若干心人心而有種心便知其心一而其種不一所以説若干二字如來以五眼之明悉知之者正以若干心雖自不同其實直謂之非心而已蓋以諸心皆屬後起絶非清淨本來何以為心其非心之故何在蓋以人心只有三項過去現在未來是也三者俱不可必得而人心不免涉之如來特於此處見其非心正是五眼具足是也雲峯説過去現在未來不必作前世今世後世看即以一事一言論如出口便是過去方言便是現在未言便是未來總在一時説不分前後此三句經極有意味前言若干心此止説三種心者見非心不外於三種耳過去心者此事已過此心尚留便多眷戀顧惜之意所以此心一留則終身迷惑現在心者即如富貴貧賤各有其位不得越位而求人惟看不破目前之所處而以為我所在者當久於此也則眷戀之心出矣又以為我所在者特暫於此也厭常之心又出矣故現在而不自知其為現也未來者此境不在目前而設一或然之想此境尚在後日而設一預期之思便多患得患失之心未來而果得來則開僥幸之竇未來而終不得來又開怨尤之門如來説三箇不可得不是婉轉商量直是斬釘嚼鐵語所以破衆生之非心者亦甚決矣雲峯又説現在心原不脫日用飲食事但有此心而又生不自在者何故蓋緣人於現在處每多不自足便不能自在矣如來説現在心原説人不肯以現在自求而反去現求賖則知過去未來俱從現在處發出賖想矣譬如身處於此此即現在而尚以此為未足更追及於前計想於後而并現在者不可得矣此又以現在心生出過去未來心之大略也得字亦有解此處説得皆是必不可得而強求得者猶儒家言得之有命求無益於得之説也法界通化分第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不説得福德多以福德無故如來説得福德多子真説上言非心不可得如此則是福德者我性中所固有自可以不求而得如來亦以無所得言之非謂福德本無也福德在性則不求而得福德在布施則得而還歸於無得此又如來深一層義故問須菩提以為如是布施而得福德其中因緣得少得多似有分寸是布施多得福德亦多則福德隨布施而轉矣何關於性故説一實字夫福在德性則虗在布施則實實則其中因緣便可限量而福德之多亦有限量故如來説一無字以見福德之多不過從我之説而起見非真有多之形迹耳雲峯説有則實無則虗福德不是外來之物何故説到因緣蓋以福德原有種子便是因緣因者仍其舊也凡事必有因而後緣之以起但因中亦有兩端因其善者即緣善而起因其惡者亦緣惡而萌此處只説善因緣正以福德性本善也善本性生何有惡之夾雜特借布施一端以為修善之基非以布施較多論少而隨布施隨與福德也福德尚不可得而欲得非心可乎結句處當著眼看離色離相分第二十須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足子真説上言福德既無則性本虗而色身斷不可著相矣色身者肉身也具足者五體無有欠缺也佛有五體衆生亦有五體是言佛身即以該衆生之身今且不言佛之具足相試即以衆生之具足者證之則知衆生而能有具足相者皆佛也故言佛可以無所欠缺之肉身相見否言有是相則見之者必生歡喜心而究竟此身不離肉身仍歸烏有此身滅而此性長存因知色身原不可恃故説即非具足色身特因其有形以強名之耳故又言如我今日之身有三十二相是所謂具足諸相也見之者誰不生瞻仰心特以我之具足諸相不外肉身亦有盡時何可執著故雖説有三十二相具足之相實則非有也特強名之耳此兩段言具足相之別也雲峯説相到具足是為完人然貌足而性不全即非踐形之人與官之不全者何異如來説出衆生色相之不可恃隨言已三十二相之亦無足據其大旨之歸於無相而并歸於無法可知故下文即以無法申明之阿難尊者言此段竟將佛字推到衆生具足相看以見相之自衆生及諸菩薩摩訶薩直到如來皆是肉身不可恃以結無相之旨此論雖講中先有當再記之非説所説分第二十一須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故須菩提説法者無法可説是名説法爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生子真説上言無相此言無法蓋以法相相因故必相空而法亦皆空如來所以言勿謂我未説法之前先設一念謂我今將説法若使我於説法前先有是念便是我為法拘即人之聞我法者亦莫先設一聞法念謂如來將有所説法而我今得聞也若使其人設是念即為不知佛之人何能解佛所説之義謂之謗佛者以其不明説經大旨而徒惑於章句之末雲峯説上念字是如來説自己之念下念字是説衆生之念此一問又為徒恃章句以誦讀解説者言也子真説如來既言説法者與聞法者皆無法可恃則將來之世何所為據而使人信從故須菩提所以復問也言須菩提而加慧命二字見得須菩提此時己通慧命矣雲峯説慧命即慧性也性中本自有慧而此慧從性命中來不緣後起即命即慧不可分作兩項正以命非慧無由見性慧非命無以明心所以慧命合一也若單言慧則涉於後起而非先覺惟慧涵性中而與生俱生不與滅俱滅者所性故也時須菩提已得正覺故以此名之耳子真説此時須菩提又問如來此來世衆生既無法可説亦無法可聞其能信如來者可有其人否如來謂此衆生皆有佛性不可以衆生名之亦不可以非衆生名之蓋衆生之所以為衆生者特以未證佛果未登彼岸故強以衆生名之其實衆生不可限量而何槩以衆生目之乎雲峯説非衆生非不衆生是如來點化衆生處卵胎濕化諸種或有變化而脫其凡胎者一脫其凡便是登岸故説非衆生則猶有衆生之迹説非不衆生則并忘衆生之名矣故下文不説衆生而直言菩提心也無法可得分第二十二須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得名名阿耨多羅三藐三菩提子真説此段見如來於正覺之性一歸於空毫不留一得使後世藉此以為如來之正覺有異乎人故須菩提以正覺之性實無所得如來直是其言以為正覺之性不從法得無論萬法銷融即使其中稍有幾微之法可留便非真覺性矣雲峯説此段只重無有少法可得一句見如來不留一法乃通萬法法在外覺在心若以外法而覺我心則有覺有不覺故曰無有少法可得淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來説即非善法是名善法子真説上言無法可説此復言善法正以見法之同歸而無所高下故又説出善法一段如來言此法之所以無可説者以為其法甚平而不偏且相等而無差別故於其中無有高下之不同正以此無上正等正覺之心生而同具也雲峯説平等二字有別乎則一槩皆然等則便有差別就如如來與須菩提諸菩薩等俱是佛地位中人但此中何以各分名色可見平之中有等也若説到等而上之則諸菩薩便與如來同此覺性説到等而下之則諸衆生亦與如來同具此覺性此平等中無有高下之説也平等二字有另解此二句仍只説法未嘗説人但法隨人而分高下其實平等二字即是儒家中庸二字蓋言此法原無奇異而甚平亦無分類而有等正使後世若智若愚共聞共見乃不至以異端左道壞此平等之法也此解專講平等二字而下句自明矣子真説惟此覺性人人同具則先覺者正當覺其後覺而何有人我四相可存故曰無四相也蓋無相則所為法者皆覺性之善直謂之善法可也法無所為善因性而善若執定如來説法又著善法便落法相故曰即非善法但虗名之耳雲峯説善法説到覺性中之善則善仍不在法上説矣福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及子真説因言善法又推到布施因説布施又歸到受持解説是從善法連絡下來如來又言若世界中人有能以須彌山王大之七寶集聚一處以行布施可謂多矣而終不若受持解説之福德勝於此布施者皆因其法之善故也故言百分不及一百千萬億分而至於算數譬喻亦有所不能及者總以明其善法耳雲峯説前言布施而以恆河沙喻此言布施而以須彌山喻前言其多此言其大聚者聚天下之七寶於一處而不分人我之物也此段經義似言之又言其實貫串善法二字説來可見如來説經之義自是法平等句起至即非凡夫一段俱因無法可説生出善法一番問答是凡夫句以下則又以無相可説生出一合相一番問答矣化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者須菩提如來説有我者即非有我而凡夫之人以為有我須菩提凡夫者如來説即非凡夫是名凡夫子直説上言經義之妙如此則是如來以此經度人多矣而如來又言莫謂今日説經時設一念以為我之説經單為我欲度後世衆生也若使作是念謂以此度衆生則法雖善而已存一我相蓋有我而説經有我説經而以經度人是以佛自待以衆生待人何所為度故設一無我之問以使後世之受持解説者皆當無我也為人解説而存有我即凡夫矣蓋凡人之心原思度人而解説特自謂此經者非我不能誦非我不能解即不是如來説經之心非凡夫而何言貪著其事正謂貪著度人之事也然言凡夫則必有與凡夫相對者而有我之相又生故曰凡夫者特強名之耳非真有凡夫也雲峯説凡夫不是愚人一種以其未能超凡入聖謂之凡夫看淺不得如來段段要人持誦解説反以凡夫目後世之人寧有是理特以度世人於既度之後更無有度世名色留於心中此正如來望後人不作凡夫度世想即是入聖地位矣此段是如來借己以喻後人處不可作落空話頭法身非相分第二十六須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來爾時世尊而説偈曰若以色見我以音聲求我是人行邪道不能見如來雲峯説此段又以色相反覆申明總是啓發須菩提悟到一合相處前言三十二相不可得見矣此復問可以得見者正是如來要須菩提認清不可以色相見如來意故須菩提言如是如是是迎如來之機以見不同於轉輪聖王也轉輪即法輪也有此法輪而無人轉之不知輪之可致遠故其功在於能轉之者轉輪聖王亦具如來之相更能以如來之法化行一國其實未嘗以因有此相而行如來之法若謂以其具相而得行其法聖王與如來何異故曰即是如來非真同如來也因説四句偈以明之見得色與音聲俱落於相而不可著何可以此欲見欲聞乎若僅以此色而求見以此音聲而求聞便失如來真空無相之旨誤入於邪道而行之者皆非正宗安能得見如來真面目乎此段是經中一結穴處要之無我相四句俱於四句剖明而後之四句偈亦於此關照者雲峯又説前説見如來是如來令須菩提一眼覷定意此説觀如來是如來令須菩提一心會著意前説在外後説在內此二字之不同解也無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相子真説此段問答只重斷滅相三字如來既具此相而不以一相自存所以無處不具足耳故説不以具足相得正覺心蓋正覺之心不倚於相而特借相之具足以證此心見有是心者其相未有不具足究竟三藐三菩提心何有於相乎故復説斷滅相以證之其實斷滅相亦不可得而名也雲峯説斷滅相不是斬根絶蒂之意若斷而實連若滅而實生此從不留一法相繪出一段真空光景若終於斷滅而無一法可傳豈是如來引導之意雲峯又説人但知釋氏説法空虗豈知如來言真空無相實實從實地功夫做到絶頂方得真空無相即如不斷滅三字是如來引人於大路使人各正覺性假令此法有斷絶滅熄時豈能令人信受而奉持惟不斷絶則法自與天地同終始天地旋轉從無歇息此法之不斷滅亦復如是如來説法到此真有懸針度影之喻矣不受不貪分第二十八須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德雲峯説此段內要著眼無我得成於忍句受福德作福德各有分別受字對上布施二字以其所施得其所受作字又對上受字因其所受見其所作此處又借布施一段説出得成於忍不重布施如來言以此布施不若其成於忍者之受福德尤勝蓋以忍者成道之入門訣無我之念成於自然勉強之功能忍居多人惟不能忍便不能有成不知無我之心所以得證菩提者皆自忍而成也故謂之一切法無我得成於忍此句當作一句讀前言布施屬之衆生此又屬之菩薩非謂菩薩去布施正從此印證菩提心耳子真説何以故言所得之故何以勝於前也蓋以得之者我所固有不假外來非因一施而一受故言菩薩不受福德故也不受者非云與之却而不受我所自有非人授之何處可容其受故謂之不受也雲峯説與我却而不受者外物也受之而不容受者己性也福德是性非有損益從何而受故又言菩薩之所作福德不應貪著福德自作之自受之其實若以此據為我有求多於福德則貪矣貪則未有不著於相者其故皆緣欲受之心而起故菩薩之所以不受也貪著二字又不同貪嗔癡解此貪字是向證上果者言須領會上皆以無為而有差別則知有為處亦是貪即著於有為矣可以此參之方得入細威儀寂靜分第二十九須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來子真説上言不可貪著則是法相者尤不可著故如來言我之於世不可以來去坐臥定也若使人言如來若來則存一形容之相言若去則存一虗滅之相言若坐若臥則存一與世往來之相便是以相觀如來而不解所説如來之義矣何以見其不解之故如來者非有非無以為其來實無所從自而來以為去實無所自而去故以其名如來也雲峯説此段是借去來坐臥四字以喻其意四字上各有若字便見非真有去來坐臥也但為後人依墻傍壁者言耳人惟信如來是有形有色之人則心中忽設一來念便覺其若來而瞻禮敬肅之事起矣設一去念而以為若去則一切枯禪稿性之説起矣設一坐臥念而以為若坐臥則凡遇一塔一廟便謂此中有如來趺坐寢息其內而依藉之想又起矣故槩以不解所説義解後人之惑不知如來二字不著形迹話頭就如形之隨影形滅而影自消形著而影復現形影相隨似無似有其實來之與去此身見得明白而後此身信得明白即看得空虗故説無所從來亦無所去也二句來去不對只重無所從來句下句帶言之耳如來但解來義不解去義若以來字同去字看便有形迹來而曰如來者如其所性而來便有與生俱來之意若有是生而不有如其性以偕來者何所謂生故儒家言人生也直是即如其性以來之注腳也但看從來二字則知來而相從者何物如來言無所從者不是言來時一無所從也此性最為虗靈若説其從何處發腳便有影子故説一無所字實實見正覺之心與生俱生而不落方嚮也此句妙理如是何故説得不著邊際下句何以見帶言玩一亦字可知如來但説如來不曾説如去若使來與去相較一番把過去未來套論塞責大掩如來面目矣但亦無所去亦自有解言來曰從來言去曰所去即以其所從來而還歸於所去也來者完全而來去者不欠缺而去則知去而復來依然如此何得不謂之如來乎如來之大意若此足矣一合理相分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛即不説是微塵衆所以者何佛説微塵衆即非微塵衆是名微塵衆世尊如來所説三千大千世界即非世界是名世界何以故若世界實有者即是一合相如來説一合相即非一合相是名一合相須菩提一合相者即是不可説但凡夫之人貪著其事子真説上言如來無相者以覺性嘗存於世界中而不與世界同起滅也故此又以微塵喻世界而發明不可有一合相之故如來故借微塵之細以喻世界之大復以世界之大碎為微塵之細甚言其不可形容之意究竟塵而説到微處便眼可得見手不可得著正以微塵甚多而難據耳雲峯説説微塵説世界是言小之難容一芥大之可藏須彌而大小之形皆不可著故又反覆以申明其言三千大千世界而碎為微塵者甚言大可破為小也説微塵而等於大千世界者甚言小可容其大也其實如來説不盡此中之奧故特以喻言明之一合者一合而不可復分也未有合之事先起合之心心合於事而相形矣就如耳目口鼻未起一念則色聲香味全然無形及念起而欲視則合於色相矣念起而欲聽則合於聲相矣念起而欲口鼻如其意則合於香味相矣皆因一念所發遂與相相牽是即所謂物交物引之而己之説也子真説此一合相應有應無可從法相中討出真消息否雲峯説還從法相外尋之子真説一合相之起不出於人我色聲等因只是如來既空塵相便覺正性所存俱無執著其中自有不求合而合之理豈嘗有一合相乎合字易解一合難解合而言一合者如膠漆著物始不相合才合便堅固而不可解所以合相易於貪著耳一者舉其初念而言初念一起即合到底著迷故謂之凡夫云爾如來無相不空豈有一合相可名乎知見不生分第三十一須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不不也世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來説即非法相是名法相子真説如來又云我今説此經義實實無有四相可形容而得見者若心中先存一無四相之見便是四相仍有強欲其無則後人之不解所説義者多矣蓋以所言無之故不是昔有四相而今無之要以合下便無何所為四相故其説人我衆生壽者即非有是相以説法時無可指示特虗名之耳究竟正覺中何有四相之名故又言若使能證此菩提心者定應以如是心知覺以如是心見識如是心解説則在在皆無上正等正覺之心矣又何有法相之可生乎蓋以法相者入門之路而非造極之處所以借此引導不可以此證心故言所説法相何有法相之可存特虗名之耳雲峯説前言人我衆生壽者四相此復言見字有別言相則尚有相在言見則并無無相之見矣見非見之於目直見之於心心有此見則相雖無而仍著於有如來言此恐後人誤信如來説法因有四相欲其強制以歸於無故復申明言此以為正覺中本無四相所以真空而非有相可強制以歸於無者所以特説見字又比前説深一層三如是俱指菩提心言此三句照應初問云何應住句蓋結如是知如是見如是解則應如是住也不生法相照應初問云何降伏其心句蓋結到法相不生則更無起滅而應如是降伏也此段已幾幾乎收拾到應無所住句之章旨勿可看作三如是字面是承接之詞直應到下如如不動而反結到如是我聞句矣知字見字信解字俱是收束全經許多話頭亦字字有分別凡人之慧從知而發故不知則無所見矣惟心既有所知而見識始出有見識而後能信解之則是前之四果菩薩以至須菩提諸天人阿修羅衆生無有高下而必如是乃能證般若耳誦讀解説者須於此著眼應化非真分第三十二須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀子真説前此無相之故已了了分明終章只一借布施發出不取於相以證如如之旨故言若人以無量無數世界之七寶用以布施較之恆河沙更為大且多矣而終不若以此經與四句偈受持讀誦為人演説其義更有勝於布施之福者正以布施尚有相而此則無相也雲峯説此處單言為人演説者正以度人之功較之度己尤難故易解字説演字其義各自不同解者只以其大意而解之演者并其字句而演之矣故演字當作衍意説使天下後世之人無不推求詳衍而無一字一句稍存疑義也子真説其所以為人演説者云何正以無有人我之相故耳故凡一切相皆無足取而如其心以應之雖當紛動之會而此中却如如不動也雲峯説如如不動句上如字虗下如字實如如者適如其所如也此二句與儒家明明安安等説同蓋凡人之心不如者多惟其不如所以六塵四相紛擾於中而動不勝動至於賢聖覺性具足在在皆如更無有不如者稍稍關礙故能認清覺路適如其所如如如者因如之一字無可增減減之則非如增之亦不可以為如故疊言如如以見其中更無可容一物而澄然湛然即入於紛擾之處外遇雖動而中却不動萬法從此消歸矣此如來之真面目也下四句只説得一箇空相經義已於此句收拾全旨子真説何以見不取於相之故蓋有相則有為有為即著於法而不能如如不動矣正以一切有為之法皆無可執就如夢之得醒而夢境成虗術之有幻而形聲莫據水之有泡而泡滅即無有泡影之隨身影息而即無有影與夫朝露之晞於日電火之熄其光六者是皆瞬息無形何有為之法可執乎故説有為之法應作如是六者觀也雲峯説如是觀不可指定六者六者是喻言何可執定大意還是如來説人能識真空無相之旨則在在皆如是矣而何有不可得觀者此句推開一説便可將兩儀四象盡融於太極六塵四相盡空於如如觀之者能通前徹後而燎然於如是之中矣此正如來經義之與天地同起滅也佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行子真説爾時如來説經已畢其聞是經者若須菩提則為弟子中之長老以及僧衆之名諸比丘尼衆之名比丘尼善男子之名優婆塞善女子之名優婆夷及天神人類鬼王之名阿修羅莫不聞如來説經之義而生歡喜心以信受奉行也雲峯説聞之而不能信徒然聞也信之而不能行徒然喜也終篇而説此四字可以見此經之受持讀誦為人演説者能有始有終勿至懈忽而如來之教常行於天壤矣補注第一分次第乞不是如來一身去乞尚有千二百五十人與俱者第十二分阿修羅惡王名即羅剎國之主亦有大神力而能與如來之法相敵者但邪正不同故如來説法時彼作比丘相而來如來能以慧眼覷出阿修羅無可施其魔力遂使反邪歸正所以此經中每説一切天人阿修羅正從此時證果者十四分如來三世轉身歌利王事尚在第一世受記於燃燈佛在第二世昔為歌利王昔字昔在燃燈佛所昔字俱不作昔字看五百歲是如來約略之時大凡世運以五百歲而一治亂此時即出而復為化度所以視五百歲為期也日光明照秋毫皆矚何色不見此處色字不同六塵之色見得滿眼乾坤山河大地無非是色故謂種種色十六分於後末世末世者此從五百歲內當亂未治之時言此時適遭亂劫衆生有不可度者幸存此經而於衆生中有悔過自新之人如來即以菩提心引之而登彼岸可見如來説到末世亦自存一護法念頭矣試以末世之略言之莫甚於晉魏間沙門於此極盛亦於此極衰故魏主造浮屠高至百尋多至千億一旦改釋從道毀寺滅像以及遍戮僧衆凡無一存非末世而何金剛經注釋跋金剛一經蓋諸經之祖也其義以覺性為宗雖曰真空無相而皆原本實理筏度羣生顧解是經者半屬宗門傳會未得如來真詮何裨覺性獨茲注釋得自乩書尤為罕覯自余雲間友人李野汀諱廷恩少時即虔誦金剛經已而受異人乩語勸人濟度歲辛丑應江西新昌令胡孚中之幕暇即與其友運乩遇子真大仙乩示延雲峯大師奉如來旨得傳金剛經注解蓋與禪家之語録衍説迥異余家世修善自高祖建佛堂塑大士像虔供誦經已五世于茲余既業儒未就竊欲求通覺性以證菩提適壬寅冬同邑念祈王公諱守唐為浙江海鹽令幕余偕來遂得與野汀同事成莫逆交野汀為余談乩傳始末余聆之駭為希有之奇又授以經解朝夕披誦皆真實了義雖雲峯師釋之子真師訂之不啻如來耳提面命而皈依恐後矣然雲峯師有云後人刊而布之可當寰中一鑑余未能為如來功臣而志切津梁于是捐資鐫印發心施舍以廣其傳庶使善信共明正覺咸登比丘衆千二百五十人之列是余兩人之願也夫時康熙甲辰中秋關中郃陽縣奉佛弟子雷應期乩賜法名照淵齋沐敬跋
